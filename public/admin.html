<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Cloud Coffee & Eatery - Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    :root {
      --primary-dark: #16697a;
      --primary-light: #489fb5;
      --secondary-cyan: #82c0cc;
      --secondary-cream: #f2ebe2;
      --secondary-mint: #eff9f6;
    }

    body {
      background-color: var(--secondary-cream);
    }

    .card {
      border: none;
      box-shadow: 0 4px 20px rgba(22, 105, 122, 0.15);
    }

    .card-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
      color: white;
      border: none;
    }

    .btn-primary {
      background-color: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-primary:hover {
      background-color: var(--primary-light);
      border-color: var(--primary-light);
    }

    .btn-danger {
      background-color: #c82333;
    }

    .btn-warning {
      background-color: #e0a800;
      color: white;
    }

    .btn-info {
      background-color: var(--secondary-cyan);
      border-color: var(--secondary-cyan);
    }

    .btn-success {
      background-color: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-success:hover {
      background-color: var(--primary-light);
      border-color: var(--primary-light);
    }

    #messagesList, #usersList, #filteredWordsList {
      max-height: 350px;
      overflow-y: auto;
    }

    .border {
      border-color: var(--secondary-cyan) !important;
    }
  </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12 text-center mb-4">
                <img src="assets/logo_OC.png" alt="One Cloud ChitChat Logo" style="max-width: 100px; margin-bottom: 15px;">
                <h2>Admin Panel - One Cloud ChitChat</h2>
            </div>
        </div>
        
        <div class="row g-4">
            <div class="col-12 col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Kelola Pesan</h5>
                        <button class="btn btn-sm btn-light" id="wipeChatBtn">Wipe All Chat</button>
                    </div>
                    <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                        <div id="messagesList"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0">Kelola Pengguna</h5>
                    </div>
                    <div class="card-body" style="max-height: 200px; overflow-y: auto;">
                        <div id="usersList"></div>
                    </div>
                </div>
                
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">Filter Kata</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" id="filterWordInput" placeholder="Masukkan kata yang ingin difilter">
                            <button class="btn btn-info" id="addFilterBtn">Tambah</button>
                        </div>
                        <div id="filteredWordsList"></div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Kirim Pesan Besar (Pop-Up)</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <label class="form-label">Pengirim (Sender)</label>
                            <input type="text" class="form-control" id="bigMessageSender" placeholder="Masukkan nama pengirim...">
                        </div>
                        <div class="input-group">
                            <input type="text" class="form-control" id="bigMessageInput" placeholder="Masukkan pesan...">
                            <button class="btn btn-success" id="sendBigMessageBtn">Kirim</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
