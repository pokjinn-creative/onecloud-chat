<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Cloud Coffee & Eatery - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">Admin Panel - One Cloud Coffee & Eatery</h2>
            </div>
        </div>
        
        <div class="row g-4">
            <div class="col-12 col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">Kelola Pesan</h5>
                    </div>
                    <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                        <div id="messagesList"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0">Kelola Pengguna</h5>
                    </div>
                    <div class="card-body" style="max-height: 200px; overflow-y: auto;">
                        <div id="usersList"></div>
                    </div>
                </div>
                
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">Filter Kata</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" id="filterWordInput" placeholder="Masukkan kata yang ingin difilter">
                            <button class="btn btn-info" id="addFilterBtn">Tambah</button>
                        </div>
                        <div id="filteredWordsList"></div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Kirim Pesan Besar (Pop-Up)</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" id="bigMessageInput" placeholder="Masukkan pesan...">
                            <button class="btn btn-success" id="sendBigMessageBtn">Kirim</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
