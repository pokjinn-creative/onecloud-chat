<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Cloud Coffee & Eatery - Display</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="display.css">
</head>
<body>
    <div class="container-fluid p-0">
        <div class="header text-white text-center py-4">
            <img src="assets/logo_OC.png" alt="One Cloud ChitChat Logo" style="max-width: 150px; margin-bottom: 15px;">
            <h1>One Cloud ChitChat</h1>
        </div>
        <div class="chat-display p-4" id="chatDisplay">
        </div>
    </div>

    <div class="big-popup d-none" id="bigPopup">
        <div class="popup-content">
            <div class="popup-frame">
                <h1 id="popupMessage"></h1>
                <p id="popupSender" class="popup-sender"></p>
            </div>
        </div>
    </div>

    <script type="module" src="display.js"></script>
</body>
</html>
