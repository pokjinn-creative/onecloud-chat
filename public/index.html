<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Cloud Coffee & Eatery - Chat App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5" id="loginPage">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>One Cloud Coffee & Eatery</h3>
                        <p class="mb-0">Masuk ke Chat</p>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="nickname" class="form-label">Nama Panggilan</label>
                                <input type="text" class="form-control" id="nickname" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Jenis Kelamin</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                                        <label class="form-check-label" for="male">Laki-laki</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                        <label class="form-check-label" for="female">Perempuan</label>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Masuk</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid mt-3 d-none" id="chatPage">
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-0">One Cloud Coffee & Eatery</h5>
                            <small id="userInfo"></small>
                        </div>
                    </div>
                    <div class="card-body" id="chatContainer" style="height: 60vh; overflow-y: auto;">
                    </div>
                    <div class="card-footer">
                        <div class="d-flex gap-2">
                            <div class="input-group">
                                <input type="text" class="form-control" id="messageInput" placeholder="Ketik pesan...">
                                <button class="btn btn-outline-secondary" type="button" id="emoticonBtn">😀</button>
                            </div>
                            <button class="btn btn-primary" id="sendBtn">Kirim</button>
                        </div>
                        <div id="cooldownTimer" class="mt-2 text-center text-muted d-none">
                            Silakan tunggu <span id="timer">30</span> detik untuk mengirim pesan lagi
                        </div>
                    </div>
                </div>
                <div class="emoticon-picker mt-2 d-none" id="emoticonPicker">
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex flex-wrap gap-2">
                                <span class="emoticon">😀</span>
                                <span class="emoticon">😂</span>
                                <span class="emoticon">❤️</span>
                                <span class="emoticon">👍</span>
                                <span class="emoticon">🎉</span>
                                <span class="emoticon">🔥</span>
                                <span class="emoticon">😎</span>
                                <span class="emoticon">😍</span>
                                <span class="emoticon">😢</span>
                                <span class="emoticon">😮</span>
                                <span class="emoticon">🙏</span>
                                <span class="emoticon">✌️</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
