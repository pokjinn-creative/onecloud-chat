<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Cloud ChitChat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        #chatPage {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #chatContainer {
            flex: 1;
            overflow-y: auto;
            height: auto !important;
        }
    </style>
</head>
<body>
    <div class="container mt-5" id="loginPage">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header text-center" style="background: linear-gradient(135deg, #16697a, #489fb5); color: white;">
                        <img src="assets/logo_OC.png" alt="One Cloud ChitChat Logo" style="max-width: 120px; margin-bottom: 10px;">
                        <h3>One Cloud ChitChat</h3>
                        <p class="mb-0">Masuk ke Chat</p>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="nickname" class="form-label">Nama Panggilan</label>
                                <input type="text" class="form-control" id="nickname" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Jenis Kelamin</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                                        <label class="form-check-label" for="male">Laki-laki</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                        <label class="form-check-label" for="female">Perempuan</label>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Masuk</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="d-none flex-column h-100" id="chatPage">
        <div class="card shadow h-100 border-0 rounded-0 d-flex flex-column">
            <div class="card-header text-white d-flex justify-content-between align-items-center" style="background: linear-gradient(135deg, #16697a, #489fb5); flex-shrink: 0;">
                <div class="d-flex align-items-center gap-3">
                    <img src="assets/logo_OC.png" alt="Logo" style="max-width: 60px;">
                    <div>
                        <h5 class="mb-0">One Cloud ChitChat</h5>
                        <small id="userInfo"></small>
                    </div>
                </div>
                <button class="btn btn-light btn-sm" id="logoutBtn">Keluar</button>
            </div>
            <div class="p-3 overflow-y-auto flex-grow-1" id="chatContainer"></div>
            <div class="emoticon-picker border-top p-2 d-none" id="emoticonPicker" style="background: rgba(255,255,255,0.95);">
                <div class="d-flex flex-wrap gap-2">
                    <span class="emoticon fs-4 cursor-pointer">😀</span>
                    <span class="emoticon fs-4 cursor-pointer">😂</span>
                    <span class="emoticon fs-4 cursor-pointer">❤️</span>
                    <span class="emoticon fs-4 cursor-pointer">👍</span>
                    <span class="emoticon fs-4 cursor-pointer">🎉</span>
                    <span class="emoticon fs-4 cursor-pointer">🔥</span>
                    <span class="emoticon fs-4 cursor-pointer">😎</span>
                    <span class="emoticon fs-4 cursor-pointer">😍</span>
                    <span class="emoticon fs-4 cursor-pointer">😢</span>
                    <span class="emoticon fs-4 cursor-pointer">😮</span>
                    <span class="emoticon fs-4 cursor-pointer">🙏</span>
                    <span class="emoticon fs-4 cursor-pointer">✌️</span>
                </div>
            </div>
            <div class="card-footer" style="flex-shrink: 0;">
                <div class="d-flex gap-2">
                    <div class="input-group">
                        <input type="text" class="form-control" id="messageInput" placeholder="Ketik pesan...">
                        <button class="btn btn-outline-secondary" type="button" id="emoticonBtn">😀</button>
                    </div>
                    <button class="btn btn-primary" id="sendBtn">Kirim</button>
                </div>
                <div id="cooldownTimer" class="mt-2 text-center text-muted d-none">
                    Silakan tunggu <span id="timer">30</span> detik untuk mengirim pesan lagi
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
